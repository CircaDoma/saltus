<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/about_styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script defer src="scripts/app.js" type="module"></script>
    <script defer src="scripts/sidebar.js"></script>
    <title>Saltus - About</title>
    <link rel="icon" type="image/png" href="assets/img/favicon-2.png">
</head>
<body>
    <main>
        <a href="index.html">
            <img src="assets/img/game/day-graphic.png" data-default="assets/nav_tools/about.png" data-hover="assets/nav_tools/about-hover.png" draggable="false" alt="home" class="flavorImg fadeIn">
        </a>
        <div class="about-info fadeIn">
            <h1>ABOUT</h1>
            <h2>The Forest of Saltus</h2>
            <p>
                Saltus is organized into 206 blocks of text called nodes.
            </p>
            <p>
                The nodes lie in a branching tree, each root or branch flowing outward from a central decision.
            </p>
            <p>  
                A forest, within and without.
            </p>
        </div>
        <div class="btn-grid">
            <button class="text-btn" id="opt1btn" onclick="fadeText()">Wander the Forest</button>
        </div>
    </main>

    <div id="mobile-action-bar">
        <button class="fadeIn" id="openSettingsButton" onclick="openSettings()">
            <img src="assets/img/game/settings-open.png" draggable="false">
        </button>
        <div id="settings" onclick="closeSettings()">
            <div id="settings-buttons">
                <button class="opt-btn" id="modeBtn" onclick="toggleMode(event)">Light Mode</button>
                <button class="opt-btn" id="modeBtn" onclick="toggleMode(event)"><a href="index.html" class="opt-btn" onclick="closeSettings()">Home</a></button>
            </div>
        </div>
    </div>

    <script>
        function toggleMode(e) {
            e.stopPropagation();
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('modeBtn').textContent = isDark ? 'Dark Mode' : 'Light Mode';
            document.querySelector('#openSettingsButton img').src = isDark
                ? 'assets/img/game/settings-open-red.png'
                : 'assets/img/game/settings-open.png';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            closeSettings();
        }

        const saved = localStorage.getItem('theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
            if (saved === 'light') {
                document.getElementById('modeBtn').textContent = 'Dark Mode';
                document.querySelector('#openSettingsButton img').src = 'assets/img/game/settings-open-red.png';
            }
        }

    </script>
</body>
</html>
