<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/game_styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/img/favicon-2.png">
    <script defer src="scripts/app.js" type="module"></script>
    <script defer src="scripts/sidebar.js"></script>
    <title>Saltus - Game</title>
</head>
<body>
    <main>
        <a href="index.html">
            <img src="assets/img/game/day-graphic.png" draggable="false" alt="home" class="flavorImg fadeIn">
        </a>
        <div id="container">
            <div id="text">Text</div>
        </div>
    </main>

    <div id="mobile-action-bar">
        <div id="option-buttons" class="btn-grid">
            <button class="text-btn" id="opt1btn" onclick="fadeText()">Option A</button>
            <button class="text-btn" id="opt2btn" onclick="fadeText()">Option B</button>
        </div>
        <button class="fadeIn" id="openSettingsButton" onclick="openSettings()">
            <img src="assets/img/game/settings-open.png" draggable="false">
        </button>
        <div id="settings" onclick="closeSettings()">
            <div id="settings-buttons">
                <button class="opt-btn" id="restartBtn" onclick="restartGame(event)">Restart</button>
                <button class="opt-btn" id="musicBtn" onclick="toggleMusic(event)">Music Off</button>
                <button class="opt-btn" id="modeBtn" onclick="toggleMode(event)">Light Mode</button>
                <a href="index.html" class="opt-btn" onclick="closeSettings()">Home</a>
            </div>
        </div>
    </div>
    <audio id="musicTrack" src="audio/saltus.mp3" loop></audio>

    <div id="map"></div>

    <script>
        function toggleMusic(e) {
            e.stopPropagation();
            const track = document.getElementById('musicTrack');
            const btn = document.getElementById('musicBtn');
            track.paused ? track.play() : track.pause();
            btn.textContent = track.paused ? 'Music Off' : 'Music On';
            closeSettings();
        }

        function toggleMode(e) {
            e.stopPropagation();
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const newTheme = isLight ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            document.getElementById('modeBtn').textContent = isLight ? 'Light Mode' : 'Dark Mode';
            document.querySelector('#openSettingsButton img').src = isLight
                ? 'assets/img/game/settings-open.png'
                : 'assets/img/game/settings-open-red.png';
            localStorage.setItem('theme', newTheme);
            closeSettings();
        }

        const saved = localStorage.getItem('theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
            if (saved === 'light') {
                document.getElementById('modeBtn').textContent = 'Dark Mode';
                document.querySelector('#openSettingsButton img').src = 'assets/img/game/settings-open-red.png';
            }
        }

        function restartGame(e) {
            e.stopPropagation();
            localStorage.removeItem('currentNode');
            closeSettings();
            window.location.reload();
        }

        setTimeout(() => {
            const overlay = document.querySelector('.intro-overlay');
            if (overlay) overlay.remove();
        }, 2300);
    </script>
</body>
</html>
