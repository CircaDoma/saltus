<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/game_styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script defer src="scripts/app.js" type="module"></script>
    <script defer src="scripts/sidebar.js"></script>
    <title>SALTUS</title>
    <link rel="icon" type="image/png" href="assets/img/favicon-2.png">
</head>
<body>
    <div class="intro-overlay">
        <video autoplay muted playsinline class="intro-logo">
            <source src="assets/img/home/intro-logo.mp4" type="video/mp4">
        </video>
    </div>
    <div id="overlay" onclick="closeSideBar()" aria-hidden="true"></div>

    <main>
        <a href="index.html">
            <img src="assets/img/game/day-graphic.png" data-default="assets/nav_tools/about.png" data-hover="assets/nav_tools/about-hover.png" draggable="false" alt="home" class="flavorImg fadeIn">
        </a>
        <div id="container">
            <div id="text">Text</div>
        </div>
    </main>

    <div id="mobile-action-bar">
        <div id="option-buttons" class="btn-grid">
            <button class="text-btn" id="opt1btn" onclick="fadeText()">Option A</button>
            <button class="text-btn" id="opt2btn" onclick="fadeText()">Option B</button>
        </div>
        <button class="fadeIn" id="openSettingsButton" onclick="openSettings()">
            <img src="assets/img/game/settings-open.png" draggable="false">
        </button>
        <div id="settings" onclick="closeSettings()">
            <div id="settings-buttons">
                <button class="opt-btn" id="restartBtn" onclick="restartGame(event)">Restart</button>
                <button class="opt-btn" id="musicBtn" onclick="toggleMusic(event)">Music Off</button>
                <button class="opt-btn" id="modeBtn" onclick="toggleMode(event)">Light Mode</button>
                <button class="opt-btn" id="modeBtn" onclick="toggleMode(event)"><a href="index.html" class="opt-btn" onclick="closeSettings()">Home</a></button>
            </div>
        </div>
    </div>

    <audio id="musicTrack" src="audio/saltus.mp3" loop></audio>

    <div id="map"></div>

    <script>
        function toggleMusic(e) {
            e.stopPropagation();
            const track = document.getElementById('musicTrack');
            if (track.paused) {
                track.play();
                document.getElementById('musicBtn').textContent = 'Music On';
            } else {
                track.pause();
                document.getElementById('musicBtn').textContent = 'Music Off';
            }
            closeSettings();
        }

        function toggleMode(e) {
            e.stopPropagation();
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('modeBtn').textContent = isDark ? 'Dark Mode' : 'Light Mode';
            document.querySelector('#openSettingsButton img').src = isDark
                ? 'assets/img/game/settings-open-red.png'
                : 'assets/img/game/settings-open.png';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            closeSettings();
        }

        const saved = localStorage.getItem('theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
            if (saved === 'light') {
                document.getElementById('modeBtn').textContent = 'Dark Mode';
                document.querySelector('#openSettingsButton img').src = 'assets/img/game/settings-open-red.png';
            }
        }

        function restartGame(e) {
            e.stopPropagation();
            localStorage.removeItem('currentNode');
            closeSettings();
            window.location.reload();
        }

        setTimeout(() => {
            const overlay = document.querySelector('.intro-overlay');
            if (overlay) overlay.remove();
        }, 2300);

    </script>
</body>
</html>
