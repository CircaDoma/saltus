<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Saltus - Home</title>
    <link rel="icon" type="image/png" href="assets/img/favicon-2.png">
</head>
<body>
    <div class="intro-overlay">
        <img src="assets/img/home/intro-logo.gif" class="intro-logo">
    </div>
    <div class="container">
        <div class="graphic-stack">
            <img src="assets/img/home/1-treeline/trees.png" id="treeline-trees">
            <div class="home-text">
                <h2>You find yourself in a forest.</h2>
            </div>
            <img src="assets/img/home/2-canopy/canopy.png" id="canopy">
            <div class="home-text">
                <h2>The sword beside you is your only possession.</h2>
            </div>
            <img src="assets/img/home/3-hut/hut.png" id="hut">
            <div id="home-text-green">
                <h2>What is this place?</h2>
            </div>
            <img src="assets/img/home/4-ridge/ridge.png" id="ridge">
            <div class="home-text">
                <h2>And how do I escape?</h2>
            </div>
            <div class="fire-wrapper">
                <img src="assets/img/home/5-fire/fire.png" id="fire">
                <div class="fire-start-btn">
                    <a href="game.html">
                        <span class="nav-icon-wrap" id="start">
                            <img src="assets/nav_tools/start.png" alt="start" class="nav-art default-img">
                            <img src="assets/nav_tools/start-hover-fire.png" alt="start" class="nav-art hover-img">
                        </span>
                    </a>
                </div>
            </div>
        </div>
        <div class="cloud-wrapper">
            <div class="cloud-container">
                <img src="assets/img/home/1-treeline/cloud-scroll.png" class="cloud-scroll">
                <img src="assets/img/home/1-treeline/cloud-scroll.png" class="cloud-scroll">
                <img src="assets/img/home/1-treeline/cloud-scroll.png" class="cloud-scroll">
                <img src="assets/img/home/1-treeline/cloud-scroll.png" class="cloud-scroll">
            </div>
        </div>
        <div class="content">
            <img src="assets/img/home/production-card.png" class="production-text">
            <img src="assets/nav_tools/title-text.png" class="title-text">
            <nav id="navbar">
                <ul>
                    <li>
                        <a href="game.html">
                            <span class="nav-icon-wrap" id="start">
                                <img src="assets/nav_tools/start.png" alt="start" class="nav-art default-img">
                                <img src="assets/nav_tools/start-hover.png" alt="start" class="nav-art hover-img">
                            </span>
                        </a>
                    </li>
                    <li>
                        <a href="about.html">
                            <span class="nav-icon-wrap" id="about">
                                <img src="assets/nav_tools/about.png" alt="about" class="nav-art default-img">
                                <img src="assets/nav_tools/about-hover.png" alt="about" class="nav-art hover-img">
                            </span>
                        </a>
                    </li>
                </ul>
            </nav>
            <img src="assets/nav_tools/down-arrow.png" class="down-arrow">
        </div>
    </div>
    <script>
        setTimeout(() => {
            document.querySelector('.intro-overlay').remove();
        }, 2300);

        document.querySelector('.container').addEventListener('scroll', () => {
            document.querySelector('.down-arrow').classList.add('hidden');
        }, { once: true });
    </script>
</body>
</html>
