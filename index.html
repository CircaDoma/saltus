<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">    <link rel="stylesheet" href="styles/styles.css">
    <script defer src="scripts/sidebar.js"></script>
    <title>SALTUS - HOME</title>
    <link rel="icon" type="image/png" href="assets/img/favicon-2.png">
</head>
<div class="intro-overlay">
    <img src="assets/img/home/intro-logo.gif" draggable="false" class="intro-logo">
</div>
    <div class="container">
        <div class="graphic-stack">
            <img src="assets/img/home/1-treeline/trees.png" draggable="false" id="treeline-trees"></img>
            <div class="home-text">
                <h2>
                    You find yourself in a forest.
                </h2>
                <p class="info-card-body fadeIn">
                    
                </p>
            </div>
            <img src="assets/img/home/2-canopy/canopy.png" draggable="false" id="canopy"></img>
            <div class="home-text">
                <h2>
                    The sword beside you is your only possession.
                </h2>
            </div>
            <img src="assets/img/home/3-hut/hut.png" draggable="false" id="hut"></img>   
            <div id="home-text-green">
                <h2>
                    What is this place?
                </h2>
            </div>         
            <img src="assets/img/home/4-ridge/ridge.png" draggable="false" id="ridge"></img>
            <div class="home-text">
                <h2>
                    And how do I escape?
                </h2>
            </div>
            <div class="fire-wrapper">
                <img src="assets/img/home/5-fire/fire.png" draggable="false" id="fire">
                <div class="fire-start-btn">
                    <a href="game.html">
                        <span class="nav-icon-wrap" id="start">
                            <img src="assets/nav_tools/start.png" draggable="false" alt="start" class="nav-art default-img">
                            <img src="assets/nav_tools/start-hover-fire.png" draggable="false" alt="start" class="nav-art hover-img">
                        </span>
                    </a>
                </div>
            </div>
        </div>
        <div class="cloud-wrapper">
            <div class="cloud-container">
                <img src="assets/img/home/1-treeline/cloud-scroll.png" draggable="false" class="cloud-scroll">
                <img src="assets/img/home/1-treeline/cloud-scroll.png" draggable="false" class="cloud-scroll">
                <img src="assets/img/home/1-treeline/cloud-scroll.png" draggable="false" class="cloud-scroll">
                <img src="assets/img/home/1-treeline/cloud-scroll.png" draggable="false" class="cloud-scroll">
            </div>
        </div>
        <div class="content">
            <body>
            <img src="assets/img/home/production-card.png" draggable="false" class="production-text"></img>
            <img src="assets/nav_tools/title-text.png" draggable="false" class="title-text"></img>
            <nav id="navbar">
                <ul>
                    <li>
                        <a href="game.html">
                            <span class="nav-icon-wrap" id="start">
                                <img src="assets/nav_tools/start.png" draggable="false" alt="start" class="nav-art default-img">
                                <img src="assets/nav_tools/start-hover.png" draggable="false" alt="start" class="nav-art hover-img">
                            </span>
                        </a>
                    </li>
                    <li>
                        <a href="about.html">
                            <span class="nav-icon-wrap" id="about">
                                <img src="assets/nav_tools/about.png" draggable="false" alt="about" class="nav-art default-img">
                                <img src="assets/nav_tools/about-hover.png" draggable="false" alt="about" class="nav-art hover-img">
                            </span>
                        </a>
                    </li>
                </ul>
            </nav>
            <img src="assets/nav_tools/down-arrow.png" draggable="false" class="down-arrow"></img>
        </div>
    </div>
    <script>
        setTimeout(() => {
            document.querySelector('.intro-overlay').remove();
        }, 2300);  /* gif duration + 1s hold + 1s fade (in ms) */
        
        document.querySelector('.container').addEventListener('scroll', () => {
            document.querySelector('.down-arrow').classList.add('hidden');
        }, { once: true });

        document.querySelectorAll('.nav-icon').forEach(img => {
            const preload = new Image();
            preload.src = img.dataset.hover;

            img.addEventListener('mouseenter', () => {
                img.style.opacity = '0';
                setTimeout(() => {
                    img.src = img.dataset.hover;
                    img.style.opacity = '1';
                }, 80);
            });

            img.addEventListener('mouseleave', () => {
                img.style.opacity = '0';
                setTimeout(() => {
                    img.src = img.dataset.default;
                    img.style.opacity = '1';
                }, 80);
            });
        });
    </script>
</body>
</html>
